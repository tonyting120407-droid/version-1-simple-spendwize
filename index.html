<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpendWise</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen">
  <main class="max-w-4xl mx-auto px-4 py-8">
    <header class="mb-6">
      <h1 class="text-3xl font-bold tracking-tight">SpendWise</h1>
      <p class="text-slate-600 mt-1">Track purchases, auto-categorize spending, and view quick insights.</p>
    </header>

    <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 sm:p-6 mb-6">
      <h2 class="text-xl font-semibold mb-4">Add Transaction</h2>
      <form id="transaction-form" class="grid gap-4">
        <div>
          <label for="amount" class="block text-sm font-medium text-slate-700 mb-1">Amount ($)</label>
          <input id="amount" name="amount" type="number" min="0" step="0.01" inputmode="decimal" required class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <div>
          <label for="description" class="block text-sm font-medium text-slate-700 mb-1">Description</label>
          <input id="description" name="description" type="text" placeholder="e.g. Uber ride or grocery shopping" autocomplete="off" required class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
          <p id="category-preview" class="text-sm text-slate-500 mt-1">Category preview: Other</p>
        </div>

        <p id="form-message" class="text-sm text-rose-600 hidden"></p>

        <button type="submit" class="w-full sm:w-auto inline-flex justify-center rounded-lg bg-blue-600 px-4 py-2 text-white font-medium hover:bg-blue-700 transition">Save Transaction</button>
      </form>
    </section>

    <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 sm:p-6 mb-6">
      <h2 class="text-xl font-semibold mb-4">Summary</h2>
      <div class="grid gap-4 sm:grid-cols-2">
        <div class="rounded-lg bg-slate-50 p-4 border border-slate-200">
          <p class="text-sm text-slate-500">Total Spent</p>
          <p id="total-spent" class="text-2xl font-bold">$0.00</p>
        </div>
        <div class="rounded-lg bg-slate-50 p-4 border border-slate-200">
          <p class="text-sm text-slate-500">Transactions</p>
          <p id="transaction-count" class="text-2xl font-bold">0</p>
        </div>
      </div>
      <div class="mt-4">
        <h3 class="font-medium mb-2">Spending by Category</h3>
        <ul id="category-summary" class="space-y-2 text-sm"></ul>
      </div>
      <div class="mt-4">
        <h3 class="font-medium mb-2">Transaction History</h3>
        <ul id="summary-history" class="space-y-2 text-sm"></ul>
      </div>
    </section>

    <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 sm:p-6">
      <h2 class="text-xl font-semibold mb-4">Saved Transactions</h2>
      <ul id="transaction-list" class="space-y-3"></ul>
      <p id="empty-state" class="text-slate-500">No transactions yet.</p>
    </section>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
